<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PC/Laptop Poster Builder</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title-tabs">
        <h1 id="appTitle">PC/Laptop Poster Builder</h1>
        <div class="generator-tabs" id="generatorTabs">
          <button id="tabDiffFormat" class="tab-btn active" type="button">Generator</button>
          <button id="tabCharger" class="tab-btn" type="button">Charger</button>
          <button id="tabBrands" class="tab-btn" type="button">Brands</button>
        </div>
      </div>
      <div class="topbar-controls">
        <div class="theme-group">
          <button id="themeLightBtn" class="theme-btn active" type="button" aria-label="Light Theme" title="Light Theme">☀</button>
          <button id="themeDarkBtn" class="theme-btn" type="button" aria-label="Dark Theme" title="Dark Theme">🌙</button>
        </div>
        <div class="lang-group">
        <button class="lang-btn active" data-lang="en" title="English" aria-label="English">🇺🇸</button>
        <button class="lang-btn" data-lang="fr" title="Francais" aria-label="Francais">🇫🇷</button>
        </div>
      </div>
    </header>

    <main class="app-grid">
      <section class="preview-panel">
        <canvas id="posterCanvas" width="1080" height="1080"></canvas>
        <div class="preview-actions">
          <button id="btnGeneratePng" class="primary">Generate PNG</button>
          <button id="btnGenerateJpg">Generate JPG</button>
          <button id="btnSaveLayout" type="button">Save Layout</button>
          <button id="btnHigherResolution" type="button">Higher Resolution</button>
          <select id="higherResolutionSelect" aria-label="Higher Resolution"></select>
        </div>
        <div id="designModeBar" class="design-mode-bar hidden">
          <p id="designModeText" class="design-mode-text"></p>
          <div class="design-mode-actions">
            <button id="btnDesignExport" class="primary" type="button">Export</button>
            <button id="btnDesignCancel" type="button">Cancel</button>
          </div>
        </div>
        <p id="statusText" class="status"></p>
      </section>

      <section class="controls-panel" id="controlsPanel"></section>
    </main>

    <dialog id="exportDialog" class="ratio-dialog">
      <form method="dialog">
        <h3 id="exportDialogTitle">Export Image</h3>
        <p id="exportDialogHint">Choose whether to generate the current image, the saved higher-resolution image, or both.</p>
        <div class="ratio-options">
          <label class="ratio-choice">
            <input type="radio" name="exportMode" value="current" checked />
            <span id="exportCurrentLabel">Generate current image</span>
          </label>
          <label class="ratio-choice">
            <input type="radio" name="exportMode" value="higher" />
            <span id="exportHigherLabel">Generate higher-resolution image</span>
          </label>
          <label class="ratio-choice">
            <input type="radio" name="exportMode" value="both" />
            <span id="exportBothLabel">Generate both</span>
          </label>
        </div>
        <div id="resolutionGroup" class="input-group hidden">
          <label for="resolutionSelect" id="resolutionLabel">Higher Resolution</label>
          <select id="resolutionSelect"></select>
        </div>
        <div id="exportFolderGroup" class="input-group hidden">
          <label for="exportFolderPath" id="exportFolderLabel">Brand Export Folder</label>
          <div class="folder-picker-row">
            <input id="exportFolderPath" type="text" readonly placeholder="Choose export folder" />
            <button id="btnChooseExportFolder" type="button">Choose Folder</button>
          </div>
          <p id="exportFolderHint" class="dialog-hint">Generated images for the selected brand will be saved in that brand folder automatically.</p>
        </div>
        <div class="dialog-actions">
          <button id="btnExportDialogCancel" type="button">Cancel</button>
          <button id="btnExportDialogConfirm" class="primary" type="button">Generate</button>
        </div>
      </form>
    </dialog>

    <dialog id="brandsDialog" class="brands-dialog">
      <form method="dialog">
        <div class="brands-dialog-head">
          <h3 id="brandsDialogTitle">Brands</h3>
          <button id="btnBrandsAddToggle" class="brand-add-btn" type="button" aria-label="Add Brand" title="Add Brand">+</button>
        </div>
        <div id="brandsAddRow" class="brands-add-row hidden">
          <input id="brandsNameInput" type="text" placeholder="Brand name" />
          <button id="btnBrandsConfirmAdd" class="primary" type="button">Add</button>
        </div>
        <p id="brandsEmptyText" class="brands-empty-text hidden">No brands added yet.</p>
        <div id="brandsList" class="brands-list"></div>
        <div class="dialog-actions">
          <button id="btnBrandsClose" type="button">Close</button>
        </div>
      </form>
    </dialog>

    <script src="renderer.js"></script>
  </body>
</html>
